<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>誰是旗亭王 | 家族回鄉追逐戰 (多王版)</title>
    <style>
        :root {
            --primary-red: #a51c30;
            --gold: #d4af37;
            --bg-gray: #f4f4f4;
            --progress-bg: #e0e0e0;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 1024px) {
            .container { display: grid; grid-template-columns: 1fr 350px; padding: 20px; }
        }

        header {
            grid-column: span 2;
            text-align: center;
            background: linear-gradient(135deg, #8b0000 0%, #a51c30 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            border: 3px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .main-board {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; min-width: 850px; }

        th { background: #fff; padding: 10px 5px; border-bottom: 2px solid #ddd; font-size: 12px; }

        .name-col {
            position: sticky; left: 0; background: #fff8f8; font-weight: bold;
            z-index: 10; padding: 10px; border-right: 2px solid #eee; min-width: 100px;
        }

        .check-btn {
            width: 35px; height: 35px; border-radius: 6px; border: 1px solid #ddd;
            background: #fff; cursor: pointer; font-size: 16px; touch-action: manipulation;
        }

        .check-btn.active { background: var(--primary-red); border-color: var(--primary-red); }
        .check-btn.active::after { content: "🧧"; font-size: 12px; }

        .progress-container {
            width: 80px; background-color: var(--progress-bg); border-radius: 10px;
            height: 12px; display: inline-block; overflow: hidden;
        }

        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ffb347, #ff4b2b); transition: width 0.3s; }

        .sidebar { display: flex; flex-direction: column; gap: 15px; }

        .rank-card {
            background: white; padding: 15px; border-radius: 15px;
            border-top: 6px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }

        .btn-group { position: sticky; bottom: 10px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }

        .crown-btn {
            background: linear-gradient(to bottom, #f1c40f, #d4af37); color: #a51c30;
            padding: 18px; border-radius: 50px; border: 2px solid #fff;
            font-weight: bold; font-size: 1.2em; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer;
        }

        .save-btn { background: white; color: #666; padding: 10px; border-radius: 10px; border: 1px solid #ccc; cursor: pointer; }

        /* 旗亭王彈窗 */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }

        #award-card {
            background: #fff; padding: 40px 20px; border-radius: 20px;
            border: 8px double var(--gold); text-align: center; width: 100%; max-width: 500px;
            position: relative; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .winner-list {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
            font-size: 2.5em; color: var(--primary-red); margin: 20px 0; font-weight: 900;
            max-height: 300px; overflow-y: auto;
        }

        .winner-name-tag {
            background: #fff8f8; padding: 5px 15px; border-radius: 10px; border: 2px solid var(--gold);
        }
    </style>
</head>
<body>

<div id="overlay" onclick="closeAward()">
    <div id="award-card" onclick="event.stopPropagation()">
        <p style="letter-spacing: 5px; color: #888; font-weight: bold;">🚩 豎旗亭榮耀榜 🚩</p>
        <h1 style="color: var(--primary-red); margin: 10px 0; border-bottom: 2px solid var(--gold); padding-bottom: 10px;">旗 亭 王 認 證</h1>
        <div class="winner-list" id="announcement">
            <!-- 多位勝出者會顯示在這裡 -->
        </div>
        <p style="font-size: 1.1em; color: #333;">恭喜以上親戚榮登 2014-2026 整合之巔！</p>
        <button onclick="closeAward()" style="margin-top:20px; padding: 12px 40px; background: var(--primary-red); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer;">返回戰局</button>
    </div>
</div>

<div class="container">
    <header>
        <h1>🚩 誰是旗亭王 🚩</h1>
        <p style="margin:0; font-size: 0.9em; opacity: 0.9; letter-spacing: 2px;">2014 - 2026 豎旗亭家族過年整合戰</p>
    </header>

    <div class="main-board">
        <table>
            <thead>
                <tr>
                    <th class="name-col">親戚姓名</th>
                    <script>
                        for(let y=2014; y<=2026; y++) document.write(`<th>${y}</th>`);
                    </script>
                    <th>整合度</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="sidebar">
        <div class="rank-card">
            <h3 style="text-align: center; margin-top:0; color: var(--primary-red);">🏆 目前領先群</h3>
            <div id="rankList"></div>
        </div>

        <div class="btn-group">
            <button class="crown-btn" onclick="revealKing()">👑 正式加冕：誰是旗亭王？</button>
            <button class="save-btn" onclick="saveData()">💾 儲存數據</button>
        </div>
    </div>
</div>

<script>
    const YEARS = Array.from({length: 13}, (_, i) => 2014 + i);
    const NAMES = [
        "朱景南", "朱曾錦月", "朱朝卿", "吳美漣", "朱泰霖", "王美惠", "朱芯霏", "朱見章",
        "陳靜婷", "朱奕翰", "朱紹維", "朱秋燕", "許晏彬", "范嘉倪", "許立穎", "許育綺","麻糬","許兆皓","沈英茹"
        "朱秋蘭", "廖宏榮", "廖沛倫", "楊梓萌", "廖予深", "廖洵顏", "許舒涵", "biubiu","朱芸萱",
        "朱春男", "朱泪蒞", "朱玉枝", "黃振暉", "黃思華", "朱修世", "周君屏", "布布",
        "朱壹義", "黃秋娥", "朱慶瑞", "劉金里", "朱婕寧", "朱婕涵", "啤酒", "衛生紙",
        "朱庭揚", "黃勝雄", "朱惠貞", "呂文華", "呂彥均", "呂俞萱", "呂若菲", "湯包",
        "三姊仔","三姐夫","東敏仔","東敏老婆"
    ];

    let gameData = JSON.parse(localStorage.getItem('chilingKing_Multi_v1')) || {};
    const tableBody = document.getElementById('tableBody');

    // 建立表格
    NAMES.forEach(name => {
        const tr = document.createElement('tr');
        const tdName = document.createElement('td');
        tdName.className = 'name-col'; tdName.innerText = name;
        tr.appendChild(tdName);

        YEARS.forEach(year => {
            const td = document.createElement('td');
            const btn = document.createElement('button');
            btn.className = 'check-btn';
            const key = `${name}-${year}`;
            if (gameData[key]) btn.classList.add('active');
            btn.onclick = function() {
                this.classList.toggle('active');
                gameData[key] = this.classList.contains('active');
                updateRow(name);
                updateRanking();
            };
            td.appendChild(btn); tr.appendChild(td);
        });

        const tdStat = document.createElement('td');
        tdStat.style.textAlign = 'center';
        tdStat.innerHTML = `<div class="progress-container"><div id="bar-${name}" class="progress-bar"></div></div><div id="txt-${name}" style="font-size:10px; color:#a51c30; font-weight:bold;">0%</div>`;
        tr.appendChild(tdStat); tableBody.appendChild(tr);
        updateRow(name);
    });

    function updateRow(name) {
        let count = 0;
        YEARS.forEach(y => { if (gameData[`${name}-${y}`]) count++; });
        const p = Math.round((count / YEARS.length) * 100);
        document.getElementById(`bar-${name}`).style.width = p + '%';
        document.getElementById(`txt-${name}`).innerText = p + '%';
    }

    function getStats() {
        return NAMES.map(n => {
            let c = 0; YEARS.forEach(y => { if (gameData[`${n}-${y}`]) c++; });
            return { name: n, p: Math.round((c / YEARS.length) * 100) };
        }).sort((a, b) => b.p - a.p);
    }

    function updateRanking() {
        const ranking = getStats();
        const list = document.getElementById('rankList');
        list.innerHTML = '';
        ranking.slice(0, 10).forEach((item, index) => {
            list.innerHTML += `<div class="rank-item"><span>${index+1}. ${item.name}</span><strong>${item.p}%</strong></div>`;
        });
    }

    function revealKing() {
        const stats = getStats();
        const maxPercent = stats[0].p;

        if (maxPercent === 0) return alert("請先開始紀錄出席狀況！");

        // 找出所有達到最高出席率的人
        const kings = stats.filter(person => person.p === maxPercent);
        
        const container = document.getElementById('announcement');
        container.innerHTML = '';
        
        kings.forEach(k => {
            const span = document.createElement('span');
            span.className = 'winner-name-tag';
            span.innerText = k.name;
            container.appendChild(span);
        });

        // 根據人數動態縮小字級防止爆版
        if (kings.length > 3) container.style.fontSize = '1.8em';
        else if (kings.length > 1) container.style.fontSize = '2.2em';
        else container.style.fontSize = '2.8em';

        document.getElementById('overlay').style.display = 'flex';
    }

    function closeAward() { document.getElementById('overlay').style.display = 'none'; }
    function saveData() { localStorage.setItem('chilingKing_Multi_v1', JSON.stringify(gameData)); alert('數據已安全儲存於瀏覽器中！'); }

    updateRanking();
</script>
</body>
</html>
