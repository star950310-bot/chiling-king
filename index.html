<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旗亭回憶錄 | 2014-2026 家族大整合</title>
    <style>
        :root {
            --primary-red: #a51c30;
            --gold: #d4af37;
            --bg-gray: #f4f4f4;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @media (min-width: 1024px) {
            .container { display: grid; grid-template-columns: 1fr 350px; padding: 20px; }
        }

        header {
            grid-column: span 2;
            text-align: center;
            background: linear-gradient(135deg, #8b0000 0%, #a51c30 100%);
            color: white;
            padding: 15px;
            border-radius: 15px;
            border: 3px solid var(--gold);
        }

        /* 翻頁控制器 */
        .page-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        .nav-btn {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }

        #current-year-display { font-size: 2em; font-weight: bold; color: var(--primary-red); }

        /* 照片顯示區 */
        .photo-frame {
            width: 100%;
            height: 300px;
            background: #eee;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 5px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .main-board {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }

        .check-btn {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid #ddd;
            background: #fff; cursor: pointer; font-size: 20px;
        }

        .check-btn.active { background: var(--primary-red); border-color: var(--primary-red); }
        .check-btn.active::after { content: "🧧"; }

        /* 排行榜與側邊欄 */
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .rank-card { background: white; padding: 15px; border-radius: 15px; border-top: 6px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .crown-btn { background: var(--gold); color: #a51c30; padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; }

        /* 彈窗樣式 */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
        }
        #award-card { background: #fff; padding: 30px; border-radius: 20px; border: 8px double var(--gold); text-align: center; }
        .winner-tag { background: #fff8f8; padding: 5px 15px; border-radius: 10px; border: 2px solid var(--gold); font-size: 2em; color: var(--primary-red); font-weight: bold; }
    </style>
</head>
<body>

<div id="overlay" onclick="this.style.display='none'">
    <div id="award-card">
        <h2>🚩 豎旗亭榮耀榜 🚩</h2>
        <div id="announcement" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin: 20px 0;"></div>
        <button style="padding: 10px 20px; cursor: pointer;">關閉</button>
    </div>
</div>

<div class="container">
    <header>
        <h1>🚩 誰是旗亭王 🚩</h1>
        <p>2014 - 2026 家族過年回憶整合</p>
    </header>

    <div class="content-area">
        <div class="page-controls">
            <button class="nav-btn" onclick="changeYear(-1)" id="prevBtn">← 上一年</button>
            <div id="current-year-display">2014</div>
            <button class="nav-btn" onclick="changeYear(1)" id="nextBtn">下一年 →</button>
        </div>

        <div class="photo-frame">
            <img id="year-photo" src="https://via.placeholder.com/800x400?text=家族合照加在這裡" alt="年份照片">
        </div>

        <div class="main-board">
            <table id="yearTable">
                <thead>
                    <tr>
                        <th>親戚姓名</th>
                        <th>出席狀態</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="sidebar">
        <div class="rank-card">
            <h3 style="text-align: center; color: var(--primary-red);">🏆 總出席率排行</h3>
            <div id="rankList"></div>
        </div>
        <div class="btn-group">
            <button class="crown-btn" onclick="revealKing()">👑 正式加冕：誰是旗亭王？</button>
            <button style="padding:10px; cursor:pointer;" onclick="saveData()">💾 儲存數據</button>
        </div>
    </div>
</div>

<script>
    const YEARS = Array.from({length: 13}, (_, i) => 2014 + i);
    let currentYearIndex = 0;

    // 照片設定：請在這裡更換你的照片連結
    const YEAR_IMAGES = {
        2014: "LINE_ALBUM_2014-2026家族照片_260509_1",
        2015: "LINE_ALBUM_2014-2026家族照片_260509_2",
        2016: "LINE_ALBUM_2014-2026家族照片_260509_3",
        2017: "",
        2018: "LINE_ALBUM_2014-2026家族照片_260509_4",
        2019: "LINE_ALBUM_2014-2026家族照片_260509_6",
        2020: "LINE_ALBUM_2014-2026家族照片_260509_7",
        2021: "LINE_ALBUM_2014-2026家族照片_260509_8",
        2022: "LINE_ALBUM_2014-2026家族照片_260509_9",
        2023: "LINE_ALBUM_2014-2026家族照片_260509_123",
        2024: "LINE_ALBUM_2014-2026家族照片_260509_10",
        2025: "LINE_ALBUM_2014-2026家族照片_260509_11",
        2026: "LINE_ALBUM_2014-2026家族照片_260509_12",
        // ...以此類推到 2026
    };

    const NAMES = [
        "朱景南", "朱曾錦月", "朱朝卿", "吳美漣", "朱泰霖", "王美惠", "朱芯霏", "朱見章",
        "陳靜婷", "朱奕翰", "朱紹維", "朱秋燕", "許晏彬", "范嘉倪", "許立穎", "許育綺","麻糬",
        "朱秋蘭", "廖宏榮", "廖沛倫", "楊梓萌", "廖予深", "廖洵顏", "許舒涵", "biubiu","朱芸萱",
        "朱春男", "朱泪蒞", "朱玉枝", "黃振暉", "黃思華", "朱修世", "周君萍", "布布",
        "朱壹義", "黃秋娥", "朱慶瑞", "劉金里", "朱婕寧", "朱婕涵", "啤酒", "衛生紙",
        "朱庭揚", "黃勝雄", "朱惠貞", "呂文華", "呂彥君", "呂俞萱", "呂若菲", "湯包",
        "三姊仔","三姐夫","東敏仔","東敏老婆"
    ];

    let gameData = JSON.parse(localStorage.getItem('chilingKing_Book_v1')) || {};

    function renderYearPage() {
        const year = YEARS[currentYearIndex];
        document.getElementById('current-year-display').innerText = year;
        document.getElementById('year-photo').src = YEAR_IMAGES[year] || "https://via.placeholder.com/800x400?text=尚未上傳合照";
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        NAMES.forEach(name => {
            const tr = document.createElement('tr');
            const key = `${name}-${year}`;
            
            tr.innerHTML = `
                <td><strong>${name}</strong></td>
                <td>
                    <button class="check-btn ${gameData[key] ? 'active' : ''}" 
                            onclick="toggleAttend('${name}', ${year}, this)">
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        // 按鈕狀態控制
        document.getElementById('prevBtn').disabled = currentYearIndex === 0;
        document.getElementById('nextBtn').disabled = currentYearIndex === YEARS.length - 1;
        updateRanking();
    }

    function toggleAttend(name, year, btn) {
        const key = `${name}-${year}`;
        gameData[key] = !gameData[key];
        btn.classList.toggle('active');
        updateRanking();
    }

    function changeYear(step) {
        currentYearIndex += step;
        renderYearPage();
    }

    function updateRanking() {
        const stats = NAMES.map(n => {
            let c = 0; YEARS.forEach(y => { if (gameData[`${n}-${y}`]) c++; });
            return { name: n, p: Math.round((c / YEARS.length) * 100) };
        }).sort((a, b) => b.p - a.p);

        const list = document.getElementById('rankList');
        list.innerHTML = '';
        stats.slice(0, 10).forEach((item, index) => {
            list.innerHTML += `<div class="rank-item"><span>${index+1}. ${item.name}</span><strong>${item.p}%</strong></div>`;
        });
    }

    function revealKing() {
        const stats = NAMES.map(n => {
            let c = 0; YEARS.forEach(y => { if (gameData[`${n}-${y}`]) c++; });
            return { name: n, p: Math.round((c / YEARS.length) * 100) };
        }).sort((a, b) => b.p - a.p);

        const maxP = stats[0].p;
        if (maxP === 0) return alert("請先開始紀錄！");

        const kings = stats.filter(s => s.p === maxP);
        const container = document.getElementById('announcement');
        container.innerHTML = '';
        kings.forEach(k => {
            container.innerHTML += `<div class="winner-tag">${k.name}</div>`;
        });
        document.getElementById('overlay').style.display = 'flex';
    }

    function saveData() {
        localStorage.setItem('chilingKing_Book_v1', JSON.stringify(gameData));
        alert('回憶數據已儲存！');
    }

    renderYearPage();
</script>
</body>
</html>
